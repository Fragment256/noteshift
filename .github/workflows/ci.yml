name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12' # Use the same Python version as in pyproject.toml

    - name: Install dependencies with uv
      # Use uv to install dev and test dependencies from pyproject.toml
      run: uv install --group dev --group test

    - name: Lint with ruff via uv
      # Use uv run to execute ruff
      run: uv run ruff check .

    - name: Test with pytest and coverage via uv
      # Use uv run to execute pytest with coverage
      run: uv run pytest --cov=src/noteshift --cov-report term .

    # The following step for Codecov is optional and may require specific setup
    # - name: Upload coverage reports to Codecov
    #   uses: codecov/codecov-action@v4
    #   with:
    #     token: ${{ secrets.CODECOV_TOKEN }} # expected to be set in repository secrets
    #     fail_ci_if_error: true
