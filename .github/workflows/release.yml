name: Release

on:
  push:
    tags:
      - 'v*' # Trigger on tags like v1.0.0, v2.1.0, etc.

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12' # Match Python version in pyproject.toml

    - name: Install build dependencies
      # Installs build tools and package managers
      run: |
        pip install uv_build
        uv install --upgrade --binding python build wheel twine

    - name: Build package
      # This command builds the sdist and wheel distribution packages.
      # It uses the standard `python -m build` command.
      run: python -m build --sdist --wheel --outdir dist/ .

    # Optional: Upload to PyPI (requires TWINE_USERNAME and TWINE_PASSWORD in secrets)
